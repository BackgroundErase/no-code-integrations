name: Publish n8n Community Node

on:
  workflow_dispatch:
  push:
    tags:
      - 'n8n-v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/n8n
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: packages/n8n/package-lock.json
      - run: npm install --global npm@11.6.2
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm publish --provenance --access public
